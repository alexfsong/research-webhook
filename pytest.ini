[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    eval: opt-in end-to-end course-quality run (costs API tokens, requires ANTHROPIC_API_KEY)
    eval_regression: one-shot demo confirming the eval guards catch a regressed prompt (costs API tokens)
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning:llama_index.*
    ignore::DeprecationWarning:chromadb.*
