name: unit-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + dev deps (slim set for unit tests)
        run: |
          python -m pip install --upgrade pip
          # Unit tests don't exercise LlamaIndex / Chroma / torch / sentence-transformers.
          # Install only what `courses.py` + `courses_db.py` import at module load.
          pip install \
            "fastapi>=0.115" \
            "pydantic>=2.7" \
            "httpx>=0.27" \
            "anthropic>=0.40"
          pip install -r requirements-dev.txt

      - name: Run unit suite (network disabled, eval skipped)
        run: |
          pytest tests/unit -m "not eval" \
            --disable-socket --allow-hosts=127.0.0.1 \
            -ra --strict-markers
