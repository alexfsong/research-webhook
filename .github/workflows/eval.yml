name: eval

on:
  workflow_dispatch:
    inputs:
      judge_model:
        description: "Held-out judge model"
        required: false
        default: "claude-opus-4-7"
      max_tokens:
        description: "Hard token cap across the eval run"
        required: false
        default: "200000"

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EVAL_JUDGE_MODEL: ${{ inputs.judge_model }}
      EVAL_MAX_TOKENS: ${{ inputs.max_tokens }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install eval deps (no LlamaIndex — fixture corpus uses lexical shim)
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi>=0.115" \
            "pydantic>=2.7" \
            "httpx>=0.27" \
            "anthropic>=0.40"
          pip install -r requirements-dev.txt

      - name: Sanity-check API key present
        run: |
          test -n "${ANTHROPIC_API_KEY}" || { echo "ANTHROPIC_API_KEY missing"; exit 1; }

      - name: Run eval suite
        run: |
          pytest tests/eval -m eval -ra --strict-markers -s
